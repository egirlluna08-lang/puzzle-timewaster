<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MissTimewaster Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(30, 30, 50, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid #ff1493;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: white;
            margin-bottom: 10px;
        }

        .header p {
            color: #ff1493;
            font-size: 16px;
            font-weight: 600;
        }

        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 20px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            aspect-ratio: 1;
        }

        .tile {
            background-size: 500px 500px;
            background-position: center;
            cursor: grab;
            border: 1px solid rgba(255, 20, 147, 0.2);
            border-radius: 6px;
            transition: all 0.2s;
            overflow: hidden;
            position: relative;
        }

        .tile:hover:not(.empty) {
            transform: scale(0.98);
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.3);
        }

        .tile.movable {
            cursor: pointer;
        }

        .tile.empty {
            background: transparent;
            border: none;
            cursor: default;
        }

        .controls {
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 0 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .victory-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .victory-modal.show {
            display: flex;
        }

        .victory-content {
            background: rgba(30, 30, 50, 0.98);
            border: 2px solid #ff1493;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(255, 20, 147, 0.5);
            animation: pop 0.4s ease;
        }

        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .victory-content h2 {
            font-size: 32px;
            color: #ff1493;
            margin-bottom: 10px;
        }

        .victory-content p {
            color: white;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .victory-btn {
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .victory-btn:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .btn {
                padding: 10px 16px;
                font-size: 14px;
                margin: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MissTimewaster Puzzle 🧩</h1>
            <p>Complete the puzzle to continue wasting time~</p>
        </div>

        <div class="controls">
            <button class="btn" onclick="shufflePuzzle()">Shuffle</button>
        </div>

        <div class="puzzle-grid" id="puzzleGrid"></div>
    </div>

    <div class="victory-modal" id="victoryModal">
        <div class="victory-content">
            <h2>You Did It! 💋</h2>
            <p>Well done, you've earned some time wasted with me~ such a good boy</p>
            <button class="victory-btn" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        const GRID_SIZE = 4;
        const TILE_SIZE = 500 / GRID_SIZE; // 125px per tile
        const TOTAL_TILES = GRID_SIZE * GRID_SIZE;

        let puzzleImage = new Image();
        let tiles = [];
        let emptyPos = TOTAL_TILES - 1; // Empty spot starts at bottom-right
        let moves = 0;
        let gameWon = false;

        // Initialize
        puzzleImage.onload = function() {
            initPuzzle();
        };
        puzzleImage.src = 'puzzle-image.jpg';

        function initPuzzle() {
            // Create tiles array (0 = empty) - START SOLVED
            tiles = Array.from({length: TOTAL_TILES}, (_, i) => i);
            emptyPos = TOTAL_TILES - 1;
            renderPuzzle();
        }

        function shuffleWithSolve() {
            // Shuffle but ensure puzzle is solvable
            for (let i = 0; i < 100; i++) {
                const neighbors = getNeighbors(emptyPos);
                const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                swapTiles(emptyPos, randomNeighbor);
            }
        }

        function renderPuzzle() {
            const grid = document.getElementById('puzzleGrid');
            grid.innerHTML = '';

            tiles.forEach((tileNum, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';

                if (tileNum === 0) {
                    tile.classList.add('empty');
                } else {
                    // Calculate which part of image this tile shows
                    const row = Math.floor((tileNum - 1) / GRID_SIZE);
                    const col = (tileNum - 1) % GRID_SIZE;
                    const offsetX = (col * TILE_SIZE) / 500 * 100; // percentage
                    const offsetY = (row * TILE_SIZE) / 500 * 100; // percentage

                    tile.style.backgroundImage = `url('puzzle-image.jpg')`;
                    tile.style.backgroundPosition = `${offsetX}% ${offsetY}%`;
                    tile.style.backgroundSize = '500px 500px';

                    tile.classList.add('movable');
                    tile.addEventListener('click', () => moveTile(index));
                    tile.title = 'Click to move';
                }

                grid.appendChild(tile);
            });

            checkWin();
        }

        function getNeighbors(pos) {
            const neighbors = [];
            const row = Math.floor(pos / GRID_SIZE);
            const col = pos % GRID_SIZE;

            if (row > 0) neighbors.push(pos - GRID_SIZE); // up
            if (row < GRID_SIZE - 1) neighbors.push(pos + GRID_SIZE); // down
            if (col > 0) neighbors.push(pos - 1); // left
            if (col < GRID_SIZE - 1) neighbors.push(pos + 1); // right

            return neighbors;
        }

        function moveTile(index) {
            if (gameWon) return;

            const neighbors = getNeighbors(emptyPos);
            if (neighbors.includes(index)) {
                swapTiles(emptyPos, index);
                moves++;
                renderPuzzle();
            }
        }

        function swapTiles(pos1, pos2) {
            const temp = tiles[pos1];
            tiles[pos1] = tiles[pos2];
            tiles[pos2] = temp;
            emptyPos = pos2;
        }

        function shufflePuzzle() {
            if (gameWon) {
                location.reload();
                return;
            }
            moves = 0;
            shuffleWithSolve();
            renderPuzzle();
        }

        function checkWin() {
            if (gameWon) return;

            for (let i = 0; i < TOTAL_TILES - 1; i++) {
                if (tiles[i] !== i + 1) return;
            }

            if (tiles[TOTAL_TILES - 1] === 0) {
                gameWon = true;
                document.getElementById('victoryModal').classList.add('show');
            }
        }

        window.addEventListener('load', () => {
            if (puzzleImage.complete) {
                initPuzzle();
            }
        });
    </script>
</body>
</html>
